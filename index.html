<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jarvis AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .jarvis-glow {
            box-shadow: 0 0 50px rgba(6, 182, 212, 0.6);
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 80px rgba(6, 182, 212, 0.9); }
        }
        .listening {
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.8) !important;
            animation: pulse-red 1s infinite !important;
            background: rgb(239, 68, 68) !important;
        }
        @keyframes pulse-red {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); box-shadow: 0 0 90px rgba(239, 68, 68, 1); }
        }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen flex flex-col items-center justify-center font-sans overflow-hidden">

    <div class="text-center mb-10">
        <h1 class="text-4xl font-extrabold tracking-widest text-cyan-400">JARVIS</h1>
        <p id="status" class="text-sm text-slate-400 mt-2">Diga "E aí Jarvis" para ativar</p>
    </div>

    <div id="jarvis-core" class="w-40 h-40 bg-cyan-500 rounded-full jarvis-glow flex items-center justify-center transition-all duration-500 cursor-pointer">
        <div class="w-32 h-32 bg-slate-950 rounded-full flex items-center justify-center">
            <div class="w-12 h-12 bg-cyan-400 rounded-full opacity-50"></div>
        </div>
    </div>

    <div class="mt-12 max-w-md px-6 text-center">
        <p id="transcricao" class="text-lg italic text-slate-300">...</p>
        <p id="resposta" class="text-cyan-400 font-medium mt-4"></p>
    </div>

    <script src="app.js"></script>
</body>
</html>
